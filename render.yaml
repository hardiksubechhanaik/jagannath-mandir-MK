# Render Blueprint — API only (frontends on Vercel / Cloudflare)
# Existing service: https://jagannath-mandir-mk.onrender.com
#
# Required env on Render (old service may use MONGODB_URI — backend accepts both):
#   MONGODB_URI or MONGO_URI, JWT_SECRET (32+ chars), CLIENT_URL, RATH_TRACKER_SECRET, WALL_VOLUNTEER_SECRET
#   NODE_ENV=production, USE_MEMORY_DB=false
#
# Then on Vercel set: VITE_API_URL=https://jagannath-mandir-mk.onrender.com

services:
  - type: web
    name: sjmmk-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MEMORY_DB
        value: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: RATH_TRACKER_SECRET
        sync: false
      - key: WALL_VOLUNTEER_SECRET
        sync: false
      - key: WALL_OTP_DEV
        value: false
