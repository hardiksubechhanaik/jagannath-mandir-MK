# Render Blueprint — https://render.com/docs/blueprint-spec
# 1. Push this repo to GitHub
# 2. Render Dashboard → New → Blueprint → connect repo
# 3. Set sync:false secrets when prompted (MongoDB Atlas URI, passwords)
# 4. After deploy, set CLIENT_URL to your public + admin site URLs (comma-separated)

services:
  - type: web
    name: sjmmk-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MEMORY_DB
        value: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: RATH_TRACKER_SECRET
        sync: false
      - key: WALL_VOLUNTEER_SECRET
        sync: false
      - key: WALL_OTP_DEV
        value: false

  - type: web
    name: sjmmk-website
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sjmmk-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_RATH_SEASON
        value: true

  - type: web
    name: sjmmk-admin
    runtime: static
    rootDir: admin-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sjmmk-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SITE_URL
        fromService:
          type: web
          name: sjmmk-website
          envVarKey: RENDER_EXTERNAL_URL
